<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruits 2026 Stok</title>
    <style>
        :root {
            --stokta: #22c55e;
            --tukendi: #ef4444;
            --bg: #0a0a0a;
            --accent: #00ffcc;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center;
        }

        .app {
            width: 100%; max-width: 500px; background: #000;
            min-height: 100vh; border: 1px solid #222; padding-bottom: 80px;
        }

        header {
            padding: 20px; text-align: center; border-bottom: 3px solid var(--accent);
            background: #111;
        }

        .fruit-list { padding: 10px; display: grid; gap: 10px; }

        .fruit-card {
            background: #111; border-radius: 12px; display: flex; 
            align-items: center; padding: 12px; border: 1px solid #222;
        }

        .img-box {
            width: 60px; height: 60px; background: #1a1a1a;
            border-radius: 8px; margin-right: 15px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .img-box img { width: 80%; height: 80%; object-fit: contain; }

        .info { flex-grow: 1; }
        .info h3 { margin: 0; font-size: 16px; text-transform: capitalize; }
        
        .stock-status {
            font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px;
        }
        .status-1 { background: rgba(34, 197, 94, 0.2); color: var(--stokta); border: 1px solid var(--stokta); }
        .status-0 { background: rgba(239, 68, 68, 0.2); color: var(--tukendi); border: 1px solid var(--tukendi); }

        .price { text-align: right; font-size: 13px; color: #aaa; }

        .nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: #000; display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="app">
    <header>
        <h1 style="margin:0; color:var(--accent);">BLOX FRUITS STOCK</h1>
        <small>MAYIS 2026 - CANLI VERİ</small>
    </header>

    <div class="fruit-list" id="stock-list">
        </div>

    <div class="nav">
        <span>🛒 Market</span>
        <span>⚔️ PVP</span>
        <span>👤 Profil</span>
    </div>
</div>

<script>
    // Dediğin meyveler stokta (1), diğerleri (0)
    const fruits = [
        { n: "Yerçekimi (Gravity)", s: 1, p: "2,500,000" },
        { n: "Aşk (Love)", s: 1, p: "1,300,000" },
        { n: "Quake", s: 1, p: "1,000,000" },
        { n: "Ağrı (Pain)", s: 1, p: "2,300,000" },
        { n: "Creation (Control)", s: 1, p: "3,200,000" },
        { n: "Ses (Sound)", s: 1, p: "1,700,000" },
        { n: "Spider", s: 1, p: "1,500,000" },
        { n: "Portal", s: 1, p: "1,900,000" },
        { n: "Kauçuk (Rubber)", s: 1, p: "750,000" },
        { n: "Magma", s: 1, p: "850,000" },
        { n: "Hayalet (Ghost)", s: 1, p: "940,000" },
        { n: "Işık (Light)", s: 1, p: "650,000" },
        { n: "Kitsune", s: 0, p: "8,000,000" },
        { n: "Dragon", s: 0, p: "10,000,000" },
        { n: "Leopard", s: 0, p: "5,000,000" },
        { n: "Dough", s: 0, p: "2,800,000" },
        { n: "Buddha", s: 0, p: "1,200,000" },
        { n: "Buz (Ice)", s: 0, p: "350,000" },
        { n: "Ateş (Flame)", s: 0, p: "250,000" },
        { n: "Roket", s: 0, p: "5,000" }
    ];

    const list = document.getElementById('stock-list');
    
    fruits.forEach(f => {
        const statusLabel = f.s === 1 ? "STOKTA (1)" : "TÜKENDİ (0)";
        const statusClass = f.s === 1 ? "status-1" : "status-0";
        const iconId = f.n.split(' ')[0].toLowerCase();

        list.innerHTML += `
            <div class="fruit-card">
                <div class="img-box">
                    <img src="https://api.dicebear.com/7.x/shapes/svg?seed=${iconId}" alt="icon">
                </div>
                <div class="info">
                    <h3>${f.n}</h3>
                    <span class="stock-status ${statusClass}">${statusLabel}</span>
                </div>
                <div class="price">
                    B$ ${f.p}
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
