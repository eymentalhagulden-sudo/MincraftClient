<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOSTCLIENT - Premium Gaming Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Genel Tasarım Ayarları */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0b0c10; /* Çok koyu, hayalet temalı arka plan */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Üst Menü / Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 0, 85, 0.1); /* Hafif kırmızımsı/mor çizgi */
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ff0055; /* Hayalet kırmızısı */
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .balance-display {
            background: #1f2833;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .deposit-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .deposit-btn:hover {
            background: #ff3377;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
        }

        /* Ana Karşılama Ekranı (Hero) */
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: radial-gradient(circle at center, rgba(255, 0, 85, 0.08) 0%, transparent 60%);
            margin-top: 60px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .hero h1 span {
            color: #ff0055;
            text-shadow: 0 0 30px rgba(255, 0, 85, 0.6);
        }

        .hero p {
            font-size: 1.2rem;
            color: #c5a8b3;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .download-btn {
            background: linear-gradient(135deg, #ff0055 0%, #990033 100%);
            color: white;
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: 800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 0, 85, 0.3);
            transition: 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 0, 85, 0.6);
        }

        /* Market Bölümü */
        .market-section {
            padding: 60px 8%;
            background: #12131c;
        }

        .market-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 40px;
            font-weight: 800;
        }

        .market-title span {
            color: #ff0055;
        }

        /* Flexbox düzeni yerine alt alta/yan yana düzen */
        .market-grid {
            display: block;
            text-align: center;
        }

        .product-card {
            display: inline-block;
            background: #1f2029;
            width: 280px;
            margin: 15px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
            vertical-align: top;
        }

        .product-card:hover {
            border-color: #ff0055;
            transform: translateY(-5px);
        }

        .product-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-price {
            color: #ff0055;
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .buy-btn {
            background: transparent;
            color: white;
            border: 2px solid #ff0055;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
        }

        .buy-btn:hover {
            background: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        /* Bildirim Kutusu */
        .toast {
            position: fixed;
            bottom: -100px;
            right: 30px;
            background-color: #1f2029;
            border-left: 4px solid #ff0055;
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.5s ease-in-out;
            z-index: 2000;
        }

        .toast.show {
            bottom: 30px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">GHOSTCLIENT</div>
        <div class="user-panel">
            <div class="balance-display">Bakiye: <span id="balanceText">0</span> TL</div>
            <button class="deposit-btn" id="depositBtn">Para Yatır</button>
        </div>
    </header>

    <section class="hero">
        <h1>Rakiplerine Görünmez Ol:<br><span>GHOSTCLIENT</span></h1>
        <p>En yüksek FPS optimizasyonu, özel oyun içi pelerinler ve gelişmiş kozmetik modları tek bir çatı altında.</p>
        
        <a href="data:text/plain;charset=utf-8," download="ghostclient_kurulum.txt" class="download-btn" id="downloadBtn">İNDİR (ÜCRETSİZ)</a>
    </section>

    <section class="market-section">
        <h2 class="market-title">Kozmetik <span>Mağazası</span></h2>
        
        <div class="market-grid">
            <div class="product-card">
                <div class="product-icon">🧣</div>
                <div class="product-name">Ghost Pelerini</div>
                <div class="product-price">50 TL</div>
                <button class="buy-btn" onclick="buyProduct('Ghost Pelerini', 50)">Satın Al</button>
            </div>

            <div class="product-card">
                <div class="product-icon">👑</div>
                <div class="product-name">Premium Kanatlar</div>
                <div class="product-price">120 TL</div>
                <button class="buy-btn" onclick="buyProduct('Premium Kanatlar', 120)">Satın Al</button>
            </div>

            <div class="product-card">
                <div class="product-icon">⚔️</div>
                <div class="product-name">Özel Kılıç Efekti</div>
                <div class="product-price">75 TL</div>
                <button class="buy-btn" onclick="buyProduct('Özel Kılıç Efekti', 75)">Satın Al</button>
            </div>
        </div>
    </section>

    <div class="toast" id="toastBox">İşlem Başarılı!</div>

    <script>
        let balance = 0;
        const balanceText = document.getElementById('balanceText');
        const depositBtn = document.getElementById('depositBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const toastBox = document.getElementById('toastBox');

        // Bildirim gösterme fonksiyonu
        function showToast(message) {
            toastBox.innerText = message;
            toastBox.classList.add('show');
            setTimeout(() => {
                toastBox.classList.remove('show');
            }, 3000);
        }

        // Para Yatırma Simülasyonu
        depositBtn.addEventListener('click', () => {
            balance += 100; // Her basışta 100 TL yatırır
            balanceText.innerText = balance;
            showToast('Hesabınıza başarıyla 100 TL yatırıldı!');
        });

        // Market Satın Alım Kontrolü
        function buyProduct(productName, price) {
            if (balance >= price) {
                balance -= price;
                balanceText.innerText = balance;
                showToast(`🎉 ${productName} başarıyla alındı! Envanterine eklendi.`);
            } else {
                showToast(`❌ Yetersiz bakiye! ${productName} almak için ${price - balance} TL daha lazım.`);
            }
        }

        // İndirme Bildirimi
        downloadBtn.addEventListener('click', () => {
            showToast('📥 GHOSTCLIENT istemcisi indiriliyor... (Zararsız boş dosya)');
        });
    </script>
</body>
</html>
