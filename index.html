<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blox Trade Pro 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ffa3;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --bg: #050505;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .container {
            width: 100%; max-width: 480px; margin: 0 auto;
            min-height: 100vh; position: relative;
            background: radial-gradient(circle at top right, #0a1a15, #050505);
        }

        /* Modern Header */
        header {
            padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; }
        .logo span { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        /* Stok Kartları */
        .grid { padding: 0 20px; display: grid; gap: 15px; }
        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 15px;
            display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .card:active { transform: scale(0.96); background: rgba(255,255,255,0.08); }

        .fruit-icon {
            width: 65px; height: 65px; border-radius: 15px;
            background: linear-gradient(45deg, #111, #222);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; border: 1px solid var(--border);
        }

        .details h3 { margin: 0; font-size: 16px; font-weight: 600; }
        .status {
            font-size: 10px; font-weight: 700; padding: 4px 8px;
            border-radius: 6px; display: inline-block; margin-top: 6px;
        }
        .in-stock { background: rgba(0, 255, 163, 0.1); color: var(--accent); }
        .out-stock { background: rgba(255, 50, 50, 0.1); color: #ff3232; }

        /* Alt Navigasyon */
        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 25px; padding: 15px;
            display: flex; justify-content: space-around; z-index: 100;
        }
        .nav-item { color: #555; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }

        /* --- TAKAS PANELİ (SIDEBAR) --- */
        #trade-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 480px;
            height: 100%; background: #0a0a0a; z-index: 1000;
            transition: 0.5s cubic-bezier(0.8, 0, 0.2, 1);
            padding: 40px 25px; border-left: 1px solid var(--accent);
        }
        #trade-panel.open { right: 0; }

        .close-trade { font-size: 30px; cursor: pointer; color: var(--accent); }
        
        .trade-box {
            background: #111; border: 1px solid #222; border-radius: 20px;
            padding: 20px; margin-top: 30px; text-align: center;
        }
        
        .trade-input {
            width: 100%; background: #1a1a1a; border: 1px solid #333;
            padding: 15px; border-radius: 12px; color: white; margin-top: 20px;
            font-family: inherit; outline: none;
        }
        .trade-input:focus { border-color: var(--accent); }

        .btn-trade {
            background: var(--accent); color: black; border: none;
            width: 100%; padding: 15px; border-radius: 12px;
            font-weight: 800; margin-top: 15px; cursor: pointer;
        }

        #trade-display {
            margin-top: 30px; display: flex; flex-wrap: wrap; gap: 10px;
        }
        .offered-item {
            background: var(--accent); color: black; padding: 8px 15px;
            border-radius: 50px; font-size: 13px; font-weight: 700;
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">BLOX<span>PRO</span></div>
        <div style="font-size: 20px; opacity: 0.5;">⚡</div>
    </header>

    <div class="grid" id="fruit-grid">
        </div>

    <nav>
        <div class="nav-item active">🏠</div>
        <div class="nav-item" onclick="toggleTrade()">🔄</div>
        <div class="nav-item">👤</div>
    </nav>

    <div id="trade-panel">
        <div class="close-trade" onclick="toggleTrade()">×</div>
        <h2 style="font-size: 32px; margin-top: 10px;">Takas <span>Pazarı</span></h2>
        <p style="color: #666; font-size: 14px;">Karşı tarafın koyduğu meyveleri burada gör.</p>

        <div class="trade-box">
            <div style="font-size: 12px; color: var(--accent); margin-bottom: 10px;">ADAMIN KOYDUĞU MEYVELER</div>
            <div id="trade-display">
                <p id="empty-msg" style="color: #444; width: 100%;">Henüz meyve yok...</p>
            </div>
        </div>

        <input type="text" id="fruit-input" class="trade-input" placeholder="Meyve ismi yaz (örn: Dragon)...">
        <button class="btn-trade" onclick="addItem()">MEYVEYİ MASAYA KOY</button>
    </div>
</div>

<script>
    const fruits = [
        { n: "Yerçekimi (Gravity)", s: 1, e: "🌌" },
        { n: "Aşk (Love)", s: 1, e: "💝" },
        { n: "Quake", s: 1, e: "🫨" },
        { n: "Ağrı (Pain)", s: 1, e: "🩸" },
        { n: "Creation (Control)", s: 1, e: "🧬" },
        { n: "Ses (Sound)", s: 1, e: "🎵" },
        { n: "Spider", s: 1, e: "🕸️" },
        { n: "Portal", s: 1, e: "🌀" },
        { n: "Kauçuk (Rubber)", s: 1, e: "👒" },
        { n: "Magma", s: 1, e: "🌋" },
        { n: "Hayalet (Ghost)", s: 1, e: "👻" },
        { n: "Işık (Light)", s: 1, e: "✨" },
        { n: "Kitsune", s: 0, e: "🦊" },
        { n: "Dragon", s: 0, e: "🐉" }
    ];

    // Listeyi Oluştur
    const grid = document.getElementById('fruit-grid');
    fruits.forEach(f => {
        grid.innerHTML += `
            <div class="card">
                <div class="fruit-icon">${f.e}</div>
                <div class="details">
                    <h3>${f.n}</h3>
                    <div class="status ${f.s ? 'in-stock' : 'out-stock'}">
                        ${f.s ? 'STOKTA (1)' : 'TÜKENDİ (0)'}
                    </div>
                </div>
            </div>
        `;
    });

    // Takas Paneli Fonksiyonları
    function toggleTrade() {
        document.getElementById('trade-panel').classList.toggle('open');
    }

    function addItem() {
        const input = document.getElementById('fruit-input');
        const display = document.getElementById('trade-display');
        const emptyMsg = document.getElementById('empty-msg');

        if(input.value.trim() !== "") {
            if(emptyMsg) emptyMsg.remove();
            
            const item = document.createElement('div');
            item.className = 'offered-item';
            item.innerText = input.value;
            display.appendChild(item);
            
            input.value = ""; // Temizle
        }
    }
</script>

</body>
</html>
