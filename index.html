<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Clicker 😎 - Ultimate Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)),
                        url('https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=1000') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s;
        }

        /* Polis Efekti İçin Ekran Flaş Modu */
        .police-mode {
            animation: policeFlash 0.4s infinite;
        }
        @keyframes policeFlash {
            0% { background-color: rgba(255, 0, 0, 0.4); }
            50% { background-color: rgba(0, 0, 255, 0.4); }
        }

        /* VIP Modu Sallantı Efekti */
        .shake-screen {
            animation: screenShake 0.1s infinite;
        }
        @keyframes screenShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Oyun Alanı */
        .game-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            margin-bottom: 5px;
        }

        .cps-display {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
        }

        .clicker-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff007f, #79003e);
            border: 5px solid #fff;
            box-shadow: 0 0 30px #ff007f, inset 0 0 20px rgba(0,0,0,0.5);
            cursor: pointer;
            font-size: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s, box-shadow 0.1s, background 0.5s;
        }

        .clicker-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 50px #ff007f, inset 0 0 30px rgba(0,0,0,0.8);
        }

        /* VIP Aktifken Buton Tasarımı */
        .clicker-btn.vip-style {
            background: radial-gradient(circle, #ffd700, #b8860b) !important;
            box-shadow: 0 0 40px #ffd700, inset 0 0 20px rgba(0,0,0,0.5) !important;
            border-color: #ffd700 !important;
        }

        /* Dükkan Paneli */
        .shop-container {
            flex: 1;
            background: rgba(15, 15, 25, 0.9);
            border-left: 3px solid #00ffcc;
            box-shadow: -5px 0 20px rgba(0, 255, 204, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .shop-title {
            text-align: center;
            font-size: 2rem;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .shop-item:hover {
            background: rgba(0, 255, 204, 0.1);
            border-color: #00ffcc;
        }

        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #444 !important;
            background: rgba(255, 255, 255, 0.02) !important;
        }

        .item-info h3 { font-size: 1.1rem; color: #fff; }
        .item-info p { font-size: 0.85rem; color: #aaa; }
        .item-cost { font-weight: bold; color: #ff007f; }
        .item-count { background: #333; padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; margin-left: 10px; }

        /* Chat / Kod Bölümü */
        .cheat-box {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(20, 20, 20, 0.95);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #555;
            z-index: 100;
        }

        .cheat-box input {
            background: #222;
            border: 1px solid #444;
            color: #00ffcc;
            padding: 5px;
            outline: none;
            width: 140px;
        }

        .cheat-box button {
            background: #00ffcc;
            border: none;
            color: #000;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Büyük Bildirimler */
        .alert-text {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 5rem;
            font-weight: 900;
            z-index: 999;
            display: none;
            text-align: center;
            pointer-events: none;
        }

        #bossAlert {
            color: #ffcc00;
            text-shadow: 0 0 20px #000, 0 0 40px #ffcc00;
            animation: bossAnim 0.3s infinite alternate;
        }

        #policeAlert {
            color: #ff0000;
            text-shadow: 0 0 20px #000, 0 0 40px #ff0000;
            animation: bossAnim 0.3s infinite alternate;
        }

        @keyframes bossAnim {
            from { transform: translateX(-50%) scale(1); }
            to { transform: translateX(-50%) scale(1.1); }
        }

        .floating-text {
            position: absolute;
            color: #00ffcc;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }

        /* Grafiti Leke Efekti */
        .graffiti-splat {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.7;
            filter: blur(5px);
            z-index: 1;
        }
    </style>
</head>
<body id="mainBody">

    <!-- Bildirim Yazıları -->
    <div id="bossAlert" class="alert-text">👑 PATRON GELDİ 👑</div>
    <div id="policeAlert" class="alert-text">🚨 POLİS BASKINI! 🚨</div>

    <div class="game-container" id="gameContainer">
        <div class="score-display" id="scoreDisplay">0 Sokak Puanı</div>
        <div class="cps-display" id="cpsDisplay">Saniyede: 0</div>
        <div class="clicker-btn" id="clickerBtn">🥫</div>
    </div>

    <div class="shop-container">
        <div class="shop-title">Sokak Dükkanı</div>
        <div class="shop-item disabled" id="item1" onclick="buyItem(1)"><div class="item-info"><h3>Sokak Kedisi 🐱 <span class="item-count" id="count1">0</span></h3><p>+0.5 CPS</p></div><div class="item-cost" id="cost1">15</div></div>
        <div class="shop-item disabled" id="item2" onclick="buyItem(2)"><div class="item-info"><h3>Patenli Çocuk 🛹 <span class="item-count" id="count2">0</span></h3><p>+4 CPS</p></div><div class="item-cost" id="cost2">100</div></div>
        <div class="shop-item disabled" id="item3" onclick="buyItem(3)"><div class="item-info"><h3>Sokak Müzisyeni 🎸 <span class="item-count" id="count3">0</span></h3><p>+32 CPS</p></div><div class="item-cost" id="cost3">1100</div></div>
        <div class="shop-item disabled" id="item4" onclick="buyItem(4)"><div class="item-info"><h3>Grafiti Sanatçısı 🎨 <span class="item-count" id="count4">0</span></h3><p>+260 CPS</p></div><div class="item-cost" id="cost4">12000</div></div>
    </div>

    <!-- Sağ Alttaki Gizli Kod Alanı -->
    <div class="cheat-box">
        <input type="text" id="cheatInput" placeholder="Sokak şifresi...">
        <button onclick="checkCheat()">Gönder</button>
    </div>

    <script>
        let score = 0;
        let cps = 0;
        let vipActive = false;
        let policeActive = false;

        const items = {
            1: { name: "Kedi", cost: 15, cps: 0.5, count: 0, baseCost: 15 },
            2: { name: "Paten", cost: 100, cps: 4, count: 0, baseCost: 100 },
            3: { name: "Müzisyen", cost: 1100, cps: 32, count: 0, baseCost: 1100 },
            4: { name: "Grafiti", cost: 12000, cps: 260, count: 0, baseCost: 12000 }
        };

        const scoreDisplay = document.getElementById('scoreDisplay');
        const cpsDisplay = document.getElementById('cpsDisplay');
        const clickerBtn = document.getElementById('clickerBtn');
        const bossAlert = document.getElementById('bossAlert');
        const policeAlert = document.getElementById('policeAlert');
        const mainBody = document.getElementById('mainBody');
        const gameContainer = document.getElementById('gameContainer');

        clickerBtn.addEventListener('click', (e) => {
            let clickPower = vipActive ? 1000 : 1; // VIP ise tıklama gücü de 1000 olur
            score += clickPower;
            updateDisplay();
            createFloatingText(e.clientX, e.clientY, "+" + clickPower);
        });

        // Gelişmiş Kod Sistemi
        function checkCheat() {
            const val = document.getElementById('cheatInput').value.trim().toUpperCase();
            
            // 1. YENİ VIP KODU
            if (val === "VİP" || val === "VIP") {
                vipActive = true;
                policeActive = false; // Polisi iptal eder
                mainBody.classList.remove('police-mode');
                
                // VIP Efektleri: Ekran sarsılır, buton taca dönüşür
                mainBody.classList.add('shake-screen');
                clickerBtn.innerText = "👑";
                clickerBtn.classList.add('vip-style');
                bossAlert.style.display = "block";
                
                setTimeout(() => { 
                    bossAlert.style.display = "none"; 
                    mainBody.classList.remove('shake-screen'); // 4 saniye sonra sallantı durur
                }, 4000); 
                
                calculateCps();
                updateDisplay();
            }
            
            // 2. POLİS KODU (Risk/Ceza Kodu)
            else if (val === "POLİS" || val === "POLIS") {
                policeActive = true;
                vipActive = false; // VIP'yi iptal eder
                clickerBtn.innerText = "🥫";
                clickerBtn.classList.remove('vip-style');
                
                mainBody.classList.add('police-mode');
                policeAlert.style.display = "block";
                
                setTimeout(() => { 
                    policeAlert.style.display = "none"; 
                    mainBody.classList.remove('police-mode');
                    policeActive = false; // 7 saniye sonra polis gider
                    calculateCps();
                    updateDisplay();
                }, 7000);

                calculateCps();
                updateDisplay();
            }

            // 3. KOPİL KODU (Anında Nakit)
            else if (val === "KOPİL" || val === "KOPIL") {
                score += 500000;
                createFloatingText(window.innerWidth / 2, window.innerHeight / 2, "+500.000 Puan!", "#00ffcc");
                updateDisplay();
            }

            // 4. GRAFİTİ KODU (Ekranı Boyama Hilesi)
            else if (val === "GRAFİTİ" || val === "GRAFITI") {
                for(let i=0; i<15; i++) {
                    setTimeout(createGraffitiSplat, i * 100);
                }
            }

            document.getElementById('cheatInput').value = ""; // Kutuyu temizle
        }

        function buyItem(id) {
            let item = items[id];
            if (score >= item.cost) {
                score -= item.cost;
                item.count++;
                item.cost = Math.floor(item.baseCost * Math.pow(1.15, item.count));
                calculateCps();
                updateDisplay();
            }
        }

        function calculateCps() {
            let baseCps = 0;
            for (let id in items) {
                baseCps += items[id].count * items[id].cps;
            }
            
            // Hesaplama mantığı değiştirildi:
            if (vipActive) {
                cps = baseCps + 1000000;
            } else if (policeActive) {
                cps = Math.floor(baseCps * 0.5); // Polis varken kazanç yarıya düşer
            } else {
                cps = baseCps;
            }
        }

        function updateDisplay() {
            scoreDisplay.innerText = Math.floor(score).toLocaleString() + " Sokak Puanı";
            cpsDisplay.innerText = "Saniyede: " + cps.toLocaleString();
            
            for (let id in items) {
                let item = items[id];
                document.getElementById(`cost${id}`).innerText = item.cost.toLocaleString() + " Puan";
                document.getElementById(`count${id}`).innerText = item.count;
                let el = document.getElementById(`item${id}`);
                if (score >= item.cost) el.classList.remove('disabled');
                else el.classList.add('disabled');
            }
        }

        function createFloatingText(x, y, text, customColor = null) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            if(customColor) el.style.color = customColor;
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 20}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // Rastgele Grafiti Lekesi Oluşturma
        function createGraffitiSplat() {
            const colors = ['#ff007f', '#00ffcc', '#ffcc00', '#ff3300', '#9900ff'];
            const splat = document.createElement('div');
            splat.className = 'graffiti-splat';
            splat.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            splat.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            splat.style.top = Math.random() * (window.innerHeight - 100) + 'px';
            gameContainer.appendChild(splat);
        }

        // Oyun Döngüsü
        setInterval(() => {
            if (cps > 0) {
                score += cps / 10;
                updateDisplay();
            }
        }, 100);

        updateDisplay();
    </script>
</body>
</html>
