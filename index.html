<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruits 2026 Mega Store</title>
    <style>
        :root {
            --mythical: #cf43ff; --legendary: #ff4bb8; --rare: #0084ff;
            --uncommon: #19ff5d; --common: #b1b1b1; --bg: #0a0a0a;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center;
        }

        .app {
            width: 100%; max-width: 500px; background: #000;
            min-height: 100vh; border: 1px solid #222; padding-bottom: 80px;
        }

        header {
            padding: 20px; text-align: center; border-bottom: 3px solid #00ffcc;
            background: linear-gradient(180deg, #111, #000);
        }

        .fruit-list { padding: 10px; display: grid; gap: 12px; }

        .fruit-card {
            background: #111; border-radius: 12px; display: flex; 
            align-items: center; padding: 10px; border: 1px solid #222;
        }

        .img-container {
            width: 70px; height: 70px; background: #1a1a1a;
            border-radius: 8px; margin-right: 15px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .img-container img { width: 90%; height: 90%; object-fit: contain; }

        .info { flex-grow: 1; }
        .info h3 { margin: 0; font-size: 16px; }
        .rarity { font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .price-box { text-align: right; min-width: 100px; }
        .beli { color: #4ade80; font-weight: bold; font-size: 13px; }
        .robux { color: #fbbf24; font-size: 11px; margin-top: 4px; }

        /* Nadirlik Renkleri */
        .myth { color: var(--mythical); }
        .leg { color: var(--legendary); }
        .rar { color: var(--rare); }
        .unc { color: var(--uncommon); }
        .com { color: var(--common); }

        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: rgba(0,0,0,0.95); display: flex; 
            justify-content: space-around; padding: 15px 0; border-top: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="app">
    <header>
        <h1 style="margin:0; color:#00ffcc; font-size:22px;">BLOX FRUITS MARKET</h1>
        <small style="color:#666;">MAYIS 2026 GÜNCEL STOK</small>
    </header>

    <div class="fruit-list" id="market-list">
        </div>

    <div class="nav-bottom">
        <span>🏠 Market</span>
        <span>🔄 Takas</span>
        <span>🎒 Envanter</span>
    </div>
</div>

<script>
    const fruits = [
        { n: "Dragon (Rework)", r: "Mythical", c: "myth", b: "10,000,000", rb: "5,000", id: "dragon" },
        { n: "Kitsune", r: "Mythical", c: "myth", b: "8,000,000", rb: "4,000", id: "kitsune" },
        { n: "Leopard", r: "Mythical", c: "myth", b: "5,000,000", rb: "3,000", id: "leopard" },
        { n: "Dough", r: "Mythical", c: "myth", b: "2,800,000", rb: "2,400", id: "dough" },
        { n: "T-Rex", r: "Mythical", c: "myth", b: "2,700,000", rb: "2,350", id: "trex" },
        { n: "Mammoth", r: "Mythical", c: "myth", b: "2,700,000", rb: "2,350", id: "mammoth" },
        { n: "Spirit", r: "Mythical", c: "myth", b: "3,400,000", rb: "2,550", id: "spirit" },
        { n: "Control", r: "Mythical", c: "myth", b: "3,200,000", rb: "2,500", id: "control" },
        { n: "Venom", r: "Mythical", c: "myth", b: "3,000,000", rb: "2,450", id: "venom" },
        { n: "Shadow", r: "Mythical", c: "myth", b: "2,900,000", rb: "2,425", id: "shadow" },
        { n: "Portal", r: "Legendary", c: "leg", b: "1,900,000", rb: "2,000", id: "portal" },
        { n: "Buddha", r: "Legendary", c: "leg", b: "1,200,000", rb: "1,650", id: "buddha" },
        { n: "Blizzard", r: "Legendary", c: "leg", b: "2,400,000", rb: "2,250", id: "blizzard" },
        { n: "Rumble", r: "Legendary", c: "leg", b: "2,100,000", rb: "2,100", id: "rumble" },
        { n: "Phoenix", r: "Legendary", c: "leg", b: "1,800,000", rb: "2,000", id: "phoenix" },
        { n: "Magma", r: "Rare", c: "rar", b: "850,000", rb: "1,300", id: "magma" },
        { n: "Light", r: "Rare", c: "rar", b: "650,000", rb: "1,100", id: "light" },
        { n: "Ice", r: "Uncommon", c: "unc", b: "350,000", rb: "750", id: "ice" },
        { n: "Flame", r: "Uncommon", c: "unc", b: "250,000", rb: "550", id: "flame" },
        { n: "Rocket", r: "Common", c: "com", b: "5,000", rb: "50", id: "rocket" }
    ];

    const list = document.getElementById('market-list');
    fruits.forEach(f => {
        list.innerHTML += `
            <div class="fruit-card">
                <div class="img-container">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${f.id}" alt="${f.n}">
                </div>
                <div class="info">
                    <span class="rarity ${f.c}">${f.r}</span>
                    <h3>${f.n}</h3>
                </div>
                <div class="price-box">
                    <div class="beli">${f.b} B$</div>
                    <div class="robux">${f.rb} R$</div>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
