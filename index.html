<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blox Pro Ultra 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ffa3; --sec: #7000ff; --bg: #050505;
            --card: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .phone {
            width: 100%; max-width: 400px; height: 820px;
            background: var(--bg); border: 12px solid #1a1a1a;
            border-radius: 45px; position: relative; overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        /* --- LOGIN EKRANI --- */
        #login-screen {
            position: absolute; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; padding: 40px;
            background-image: radial-gradient(circle at top, var(--sec), transparent);
        }
        .logo { font-size: 40px; font-weight: 900; letter-spacing: -2px; text-align: center; }
        .logo span { color: var(--accent); }
        .input { 
            width: 100%; background: #111; border: 1px solid var(--border);
            padding: 18px; border-radius: 15px; color: #fff; text-align: center; margin: 20px 0; outline: none;
        }
        .btn { 
            background: var(--accent); color: #000; border: none; width: 100%; 
            padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer;
        }

        /* --- ANA UYGULAMA --- */
        #app { display: none; height: 100%; flex-direction: column; }
        .top-nav { padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .wallet-stats { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 15px; margin: 0 20px; border-radius: 20px;
            display: flex; justify-content: space-between; font-size: 12px;
        }
        .stat b { display: block; font-size: 16px; color: #fff; }

        .main-scroll { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .section-title { font-size: 11px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 15px; }

        /* Kartlar ve Buton */
        .fruit-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
        }
        .f-icon { width: 50px; height: 50px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .add-cart { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 5px 10px; font-weight: bold; cursor: pointer; font-size: 10px; margin-left: auto; }

        /* --- PANELLER --- */
        .panel {
            position: absolute; inset: 0; background: var(--bg); z-index: 1500;
            transform: translateY(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px;
        }
        .panel.active { transform: translateY(0); }
        .close-p { font-size: 30px; color: var(--accent); cursor: pointer; margin-bottom: 15px; }

        /* Sepet Listesi */
        .cart-list { max-height: 450px; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }

        /* NAV */
        nav {
            position: absolute; bottom: 25px; left: 15px; right: 15px;
            background: rgba(15,15,15,0.85); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 25px;
            display: flex; justify-content: space-around; padding: 18px; z-index: 1000;
        }
        .nav-icon { font-size: 22px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-icon.active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

<div class="phone">
    
    <div id="login-screen">
        <div class="logo">BLOX<span>PRO</span></div>
        <input type="text" id="username" class="input" placeholder="Roblox Kullanıcı Adı">
        <button class="btn" onclick="login()">SİSTEME GİR</button>
    </div>

    <div id="app">
        <div class="top-nav">
            <div id="display-name" style="color:var(--accent);">@User</div>
            <div style="font-size: 18px; cursor:pointer;" onclick="showPanel('cart')">🛒 <span id="cart-count" style="font-size:12px; color:var(--accent);">0</span></div>
        </div>

        <div class="wallet-stats">
            <div class="stat">Beli <b>12.5M</b></div>
            <div class="stat">BC Coin <b style="color:var(--accent);">450</b></div>
            <div class="stat">Robux <b>1,250</b></div>
        </div>

        <div class="main-scroll">
            <div class="section-title">MARKET STOKLARI</div>
            <div id="market-list"></div>
        </div>

        <nav>
            <div class="nav-icon active" onclick="showPanel('main')">🏠</div>
            <div class="nav-icon" onclick="showPanel('trade')">🔄</div>
            <div class="nav-icon" onclick="showPanel('cart')">🛒</div>
            <div class="nav-icon" onclick="showPanel('profile')">👤</div>
        </nav>
    </div>

    <div id="trade-panel" class="panel">
        <div class="close-p" onclick="showPanel('main')">×</div>
        <h2>Takas Masası</h2>
        <div id="trade-box" style="height:200px; background:#111; padding:15px; border-radius:15px; overflow-y:auto; font-size:12px; margin-bottom:10px;"></div>
        <input type="text" id="t-input" class="input" placeholder="Meyve adı...">
        <button class="btn" onclick="addToTrade()">EKLE</button>
    </div>

    <div id="cart-panel" class="panel">
        <div class="close-p" onclick="showPanel('main')">×</div>
        <h2>Sepetim</h2>
        <div class="cart-list" id="cart-items">
            <p style="opacity:0.4;">Sepetiniz şu an boş.</p>
        </div>
        <div style="border-top:1px solid var(--border); padding-top:15px;">
            <div style="display:flex; justify-content:space-between;"><span>Toplam:</span> <b id="cart-total" style="color:var(--accent);">0 B$</b></div>
            <button class="btn" style="margin-top:15px;" onclick="alert('Satın alma başarılı!')">SATIN AL</button>
        </div>
    </div>

    <div id="profile-panel" class="panel">
        <div class="close-p" onclick="showPanel('main')">×</div>
        <center>
            <div id="p-avatar" style="width:80px; height:80px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:35px; color:black; font-weight:900;">?</div>
            <h2 id="p-user" style="margin-top:15px;">User</h2>
            <button class="btn" style="margin-top:100px; background:red; color:#fff;" onclick="location.reload()">ÇIKIŞ YAP</button>
        </center>
    </div>

</div>

<script>
    let cart = [];

    function login() {
        const user = document.getElementById('username').value;
        if(user.length < 3) return alert("Geçerli bir isim gir!");
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('app').style.display = "flex";
        document.getElementById('display-name').innerText = "@" + user;
        document.getElementById('p-user').innerText = user;
        document.getElementById('p-avatar').innerText = user[0].toUpperCase();
        loadMarket();
    }

    function loadMarket() {
        const fruits = [
            {n: "Dragon", p: 10000000, ps: "10M", e: "🐉"},
            {n: "Kitsune", p: 8000000, ps: "8M", e: "🦊"},
            {n: "Portal", p: 1900000, ps: "1.9M", e: "🌀"},
            {n: "Light", p: 650000, ps: "650K", e: "✨"},
            {n: "Magma", p: 850000, ps: "850K", e: "🌋"}
        ];
        const list = document.getElementById('market-list');
        list.innerHTML = "";
        fruits.forEach(f => {
            list.innerHTML += `
                <div class="fruit-card">
                    <div class="f-icon">${f.e}</div>
                    <div><b>${f.n}</b><br><small>${f.ps} B$</small></div>
                    <button class="add-cart" onclick="addToCart('${f.n}', ${f.p})">EKLE</button>
                </div>`;
        });
    }

    function addToCart(name, price) {
        cart.push({name, price});
        updateCart();
    }

    function updateCart() {
        const list = document.getElementById('cart-items');
        const count = document.getElementById('cart-count');
        const totalDisp = document.getElementById('cart-total');
        count.innerText = cart.length;
        
        if(cart.length === 0) {
            list.innerHTML = `<p style="opacity:0.4;">Sepetiniz şu an boş.</p>`;
            totalDisp.innerText = "0 B$";
            return;
        }

        let total = 0;
        list.innerHTML = "";
        cart.forEach((item, index) => {
            total += item.price;
            list.innerHTML += `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>${item.price.toLocaleString()} B$</span>
                </div>`;
        });
        totalDisp.innerText = total.toLocaleString() + " B$";
    }

    function showPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
        if(id !== 'main') document.getElementById(id + '-panel').classList.add('active');
        
        const icons = document.querySelectorAll('.nav-icon');
        if(id === 'main') icons[0].classList.add('active');
        if(id === 'trade') icons[1].classList.add('active');
        if(id === 'cart') icons[2].classList.add('active');
        if(id === 'profile') icons[3].classList.add('active');
    }

    function addToTrade() {
        const inp = document.getElementById('t-input');
        const box = document.getElementById('trade-box');
        if(inp.value) {
            box.innerHTML += `<div><b>Siz:</b> ${inp.value} eklendi.</div>`;
            inp.value = "";
        }
    }
</script>
</body>
</html>
