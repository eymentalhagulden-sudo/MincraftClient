<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Clicker 😎</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=1000') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Oyun Alanı */
        .game-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            margin-bottom: 5px;
        }

        .cps-display {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
        }

        .clicker-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff007f, #79003e);
            border: 5px solid #fff;
            box-shadow: 0 0 30px #ff007f, inset 0 0 20px rgba(0,0,0,0.5);
            cursor: pointer;
            font-size: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s, box-shadow 0.1s;
        }

        .clicker-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 50px #ff007f, inset 0 0 30px rgba(0,0,0,0.8);
        }

        /* Dükkan Paneli */
        .shop-container {
            flex: 1;
            background: rgba(15, 15, 25, 0.9);
            border-left: 3px solid #00ffcc;
            box-shadow: -5px 0 20px rgba(0, 255, 204, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .shop-title {
            text-align: center;
            font-size: 2rem;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .shop-item:hover {
            background: rgba(0, 255, 204, 0.1);
            border-color: #00ffcc;
        }

        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #444 !important;
            background: rgba(255, 255, 255, 0.02) !important;
        }

        .item-info h3 {
            font-size: 1.1rem;
            color: #fff;
        }

        .item-info p {
            font-size: 0.85rem;
            color: #aaa;
        }

        .item-cost {
            font-weight: bold;
            color: #ff007f;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.3);
        }

        .item-count {
            background: #333;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        /* Uçan Sayı Efekti */
        .floating-text {
            position: absolute;
            color: #00ffcc;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 5px #00ffcc;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.2); }
        }
    </style>
</head>
<body>

    <!-- Sol Taraf: Tıklama Alanı -->
    <div class="game-container" id="gameContainer">
        <div class="score-display" id="scoreDisplay">0 Sokak Puanı</div>
        <div class="cps-display" id="cpsDisplay">Saniyede: 0</div>
        
        <!-- Ortadaki Tıklama Butonu (Sprey Kutusu Emojisi var, değiştirebilirsin) -->
        <div class="clicker-btn" id="clickerBtn">🥫</div>
    </div>

    <!-- Sağ Taraf: Shop Sistemi -->
    <div class="shop-container">
        <div class="shop-title">Sokak Dükkanı</div>
        
        <!-- Ürün 1 -->
        <div class="shop-item disabled" id="item1" onclick="buyItem(1)">
            <div class="item-info">
                <h3>Sokak Kedisi 🐱 <span class="item-count" id="count1">0</span></h3>
                <p>Saniyede +0.5 puan verir.</p>
            </div>
            <div class="item-cost" id="cost1">15 Puan</div>
        </div>

        <!-- Ürün 2 -->
        <div class="shop-item disabled" id="item2" onclick="buyItem(2)">
            <div class="item-info">
                <h3>Patenli Çocuk 🛹 <span class="item-count" id="count2">0</span></h3>
                <p>Saniyede +4 puan verir.</p>
            </div>
            <div class="item-cost" id="cost2">100 Puan</div>
        </div>

        <!-- Ürün 3 -->
        <div class="shop-item disabled" id="item3" onclick="buyItem(3)">
            <div class="item-info">
                <h3>Sokak Müzisyeni 🎸 <span class="item-count" id="count3">0</span></h3>
                <p>Saniyede +32 puan verir.</p>
            </div>
            <div class="item-cost" id="cost3">1100 Puan</div>
        </div>

        <!-- Ürün 4 -->
        <div class="shop-item disabled" id="item4" onclick="buyItem(4)">
            <div class="item-info">
                <h3>Grafiti Sanatçısı 🎨 <span class="item-count" id="count4">0</span></h3>
                <p>Saniyede +260 puan verir.</p>
            </div>
            <div class="item-cost" id="cost4">12000 Puan</div>
        </div>
    </div>

    <script>
        // Oyun Verileri
        let score = 0;
        let cps = 0;

        const items = {
            1: { name: "Sokak Kedisi", cost: 15, cps: 0.5, count: 0, baseCost: 15 },
            2: { name: "Patenli Çocuk", cost: 100, cps: 4, count: 0, baseCost: 100 },
            3: { name: "Sokak Müzisyeni", cost: 1100, cps: 32, count: 0, baseCost: 1100 },
            4: { name: "Grafiti Sanatçısı", cost: 12000, cps: 260, count: 0, baseCost: 12000 }
        };

        // Elementler
        const scoreDisplay = document.getElementById('scoreDisplay');
        const cpsDisplay = document.getElementById('cpsDisplay');
        const clickerBtn = document.getElementById('clickerBtn');
        const gameContainer = document.getElementById('gameContainer');

        // Tıklama Fonksiyonu
        clickerBtn.addEventListener('click', (e) => {
            score += 1;
            updateDisplay();
            createFloatingText(e.clientX, e.clientY, "+1");
        });

        // Ürün Satın Alma
        function buyItem(id) {
            let item = items[id];
            if (score >= item.cost) {
                score -= item.cost;
                item.count++;
                // Fiyatı her alışta %15 arttır
                item.cost = Math.floor(item.baseCost * Math.pow(1.15, item.count));
                
                calculateCps();
                updateDisplay();
            }
        }

        // Toplam CPS Hesaplama
        function calculateCps() {
            cps = 0;
            for (let id in items) {
                cps += items[id].count * items[id].cps;
            }
        }

        // Ekranı Güncelleme (Fiyatlar, Buton kilitleri vb.)
        function updateDisplay() {
            scoreDisplay.innerText = Math.floor(score) + " Sokak Puanı";
            cpsDisplay.innerText = "Saniyede: " + cps.toFixed(1);

            for (let id in items) {
                let item = items[id];
                document.getElementById(`cost${id}`).innerText = item.cost + " Puan";
                document.getElementById(`count${id}`).innerText = item.count;

                // Parası yetiyorsa aktif et, yetmiyorsa kilitle
                let itemElement = document.getElementById(`item${id}`);
                if (score >= item.cost) {
                    itemElement.classList.remove('disabled');
                } else {
                    itemElement.classList.add('disabled');
                }
            }
        }

        // Tıklayınca Sayı Uçurma Efekti
        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 20}px`;
            
            document.body.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, 800);
        }

        // Saniyelik Puan Artışı (Oyun Döngüsü)
        setInterval(() => {
            if (cps > 0) {
                score += cps / 10; // Her 100ms'de bir artış sağlamak için 10'a bölüyoruz
                updateDisplay();
            }
        }, 100);

        // İlk çalıştırma
        updateDisplay();
    </script>
</body>
</html>
