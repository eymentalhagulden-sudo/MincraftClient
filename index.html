<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Clicker 😎 - VIP Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)),
                        url('https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=1000') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Oyun Alanı */
        .game-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            margin-bottom: 5px;
        }

        .cps-display {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
        }

        .clicker-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff007f, #79003e);
            border: 5px solid #fff;
            box-shadow: 0 0 30px #ff007f, inset 0 0 20px rgba(0,0,0,0.5);
            cursor: pointer;
            font-size: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s, box-shadow 0.1s;
        }

        .clicker-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 50px #ff007f, inset 0 0 30px rgba(0,0,0,0.8);
        }

        /* Dükkan Paneli */
        .shop-container {
            flex: 1;
            background: rgba(15, 15, 25, 0.9);
            border-left: 3px solid #00ffcc;
            box-shadow: -5px 0 20px rgba(0, 255, 204, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .shop-title {
            text-align: center;
            font-size: 2rem;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .shop-item:hover {
            background: rgba(0, 255, 204, 0.1);
            border-color: #00ffcc;
        }

        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #444 !important;
            background: rgba(255, 255, 255, 0.02) !important;
        }

        .item-info h3 { font-size: 1.1rem; color: #fff; }
        .item-info p { font-size: 0.85rem; color: #aaa; }
        .item-cost { font-weight: bold; color: #ff007f; }
        .item-count { background: #333; padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; margin-left: 10px; }

        /* Chat / Kod Bölümü */
        .cheat-box {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(20, 20, 20, 0.95);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #555;
            z-index: 100;
        }

        .cheat-box input {
            background: #222;
            border: 1px solid #444;
            color: #00ffcc;
            padding: 5px;
            outline: none;
            width: 120px;
        }

        .cheat-box button {
            background: #00ffcc;
            border: none;
            color: #000;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Patron Geldi Duyurusu */
        #bossAlert {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 5rem;
            color: #ff0000;
            text-shadow: 0 0 20px #000, 0 0 40px #ff0000;
            font-weight: 900;
            z-index: 999;
            display: none;
            animation: bossAnim 0.5s infinite alternate;
        }

        @keyframes bossAnim {
            from { transform: translateX(-50%) scale(1); }
            to { transform: translateX(-50%) scale(1.1); }
        }

        .floating-text {
            position: absolute;
            color: #00ffcc;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <!-- Büyük Kırmızı Uyarı -->
    <div id="bossAlert">PATRON GELDİ</div>

    <div class="game-container" id="gameContainer">
        <div class="score-display" id="scoreDisplay">0 Sokak Puanı</div>
        <div class="cps-display" id="cpsDisplay">Saniyede: 0</div>
        <div class="clicker-btn" id="clickerBtn">🥫</div>
    </div>

    <div class="shop-container">
        <div class="shop-title">Sokak Dükkanı</div>
        <div class="shop-item disabled" id="item1" onclick="buyItem(1)"><div class="item-info"><h3>Sokak Kedisi 🐱 <span class="item-count" id="count1">0</span></h3><p>+0.5 CPS</p></div><div class="item-cost" id="cost1">15</div></div>
        <div class="shop-item disabled" id="item2" onclick="buyItem(2)"><div class="item-info"><h3>Patenli Çocuk 🛹 <span class="item-count" id="count2">0</span></h3><p>+4 CPS</p></div><div class="item-cost" id="cost2">100</div></div>
        <div class="shop-item disabled" id="item3" onclick="buyItem(3)"><div class="item-info"><h3>Sokak Müzisyeni 🎸 <span class="item-count" id="count3">0</span></h3><p>+32 CPS</p></div><div class="item-cost" id="cost3">1100</div></div>
        <div class="shop-item disabled" id="item4" onclick="buyItem(4)"><div class="item-info"><h3>Grafiti Sanatçısı 🎨 <span class="item-count" id="count4">0</span></h3><p>+260 CPS</p></div><div class="item-cost" id="cost4">12000</div></div>
    </div>

    <!-- Sağ Alttaki Gizli Kod Alanı -->
    <div class="cheat-box">
        <input type="text" id="cheatInput" placeholder="Kod yaz...">
        <button onclick="checkCheat()">Gönder</button>
    </div>

    <script>
        let score = 0;
        let cps = 0;
        let vipActive = false;

        const items = {
            1: { name: "Kedi", cost: 15, cps: 0.5, count: 0, baseCost: 15 },
            2: { name: "Paten", cost: 100, cps: 4, count: 0, baseCost: 100 },
            3: { name: "Müzisyen", cost: 1100, cps: 32, count: 0, baseCost: 1100 },
            4: { name: "Grafiti", cost: 12000, cps: 260, count: 0, baseCost: 12000 }
        };

        const scoreDisplay = document.getElementById('scoreDisplay');
        const cpsDisplay = document.getElementById('cpsDisplay');
        const clickerBtn = document.getElementById('clickerBtn');
        const bossAlert = document.getElementById('bossAlert');

        clickerBtn.addEventListener('click', (e) => {
            score += 1;
            updateDisplay();
            createFloatingText(e.clientX, e.clientY, "+1");
        });

        // Hile Kontrolü
        function checkCheat() {
            const val = document.getElementById('cheatInput').value;
            if (val === "VİP") {
                vipActive = true;
                bossAlert.style.display = "block"; // PATRON GELDİ yazısını aç
                
                // 5 saniye sonra ekrandaki yazı kaybolsun (puan gelmeye devam eder)
                setTimeout(() => { bossAlert.style.display = "none"; }, 5000); 
                
                calculateCps();
                updateDisplay();
                document.getElementById('cheatInput').value = ""; // Kutuyu temizle
            }
        }

        function buyItem(id) {
            let item = items[id];
            if (score >= item.cost) {
                score -= item.cost;
                item.count++;
                item.cost = Math.floor(item.baseCost * Math.pow(1.15, item.count));
                calculateCps();
                updateDisplay();
            }
        }

        function calculateCps() {
            let baseCps = 0;
            for (let id in items) {
                baseCps += items[id].count * items[id].cps;
            }
            // VIP aktifse ekstra 1 milyon ekle
            cps = baseCps + (vipActive ? 1000000 : 0);
        }

        function updateDisplay() {
            scoreDisplay.innerText = Math.floor(score).toLocaleString() + " Sokak Puanı";
            cpsDisplay.innerText = "Saniyede: " + cps.toLocaleString();
            
            for (let id in items) {
                let item = items[id];
                document.getElementById(`cost${id}`).innerText = item.cost.toLocaleString() + " Puan";
                document.getElementById(`count${id}`).innerText = item.count;
                let el = document.getElementById(`item${id}`);
                if (score >= item.cost) el.classList.remove('disabled');
                else el.classList.add('disabled');
            }
        }

        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 20}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // Oyun Döngüsü
        setInterval(() => {
            if (cps > 0) {
                score += cps / 10;
                updateDisplay();
            }
        }, 100);

        updateDisplay();
    </script>
</body>
</html>
