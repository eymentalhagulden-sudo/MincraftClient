<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blox Pro Ultra 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ffa3; --bg: #050505; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: #111; color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* SITE SINIRLAMA (TELEFON BOYUTU) */
        .phone-wrapper {
            width: 100%; max-width: 400px; height: 800px;
            background: var(--bg); border: 8px solid #222;
            border-radius: 40px; position: relative; overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* --- LOGIN --- */
        #login-screen {
            position: absolute; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; padding: 30px;
        }
        .login-input { 
            width: 100%; background: #111; border: 1px solid #333; padding: 15px; 
            border-radius: 15px; color: white; margin: 15px 0; outline: none; text-align: center;
        }
        .btn { 
            background: var(--accent); color: black; border: none; width: 100%; 
            padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer;
        }

        /* --- APP CONTENT --- */
        #main-app { display: none; height: 100%; display: flex; flex-direction: column; }
        .header { padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        
        /* PARA GÖRÜNTÜLEME BARI (BOT SİSTEMİ) */
        .stats-bar {
            background: var(--glass); margin: 0 20px; padding: 12px;
            border-radius: 15px; display: flex; justify-content: space-around;
            border: 1px solid var(--border); font-size: 12px;
        }
        .stat-item span { display: block; color: var(--accent); font-weight: 800; font-size: 14px; }

        /* MEYVE LİSTESİ */
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .card { 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 18px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
        }
        .icon { width: 50px; height: 50px; background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* ALT NAV */
        nav { 
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(20,20,20,0.9); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 15px; display: flex; justify-content: space-around;
            border: 1px solid var(--border);
        }
        .nav-item { cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--accent); }

        /* SİDE PANELS */
        .panel { 
            position: absolute; inset: 0; background: var(--bg); z-index: 500; 
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px;
        }
        .panel.open { transform: translateX(0); }

        /* CHAT EKSTRASI */
        .chat-box { background: #111; height: 200px; border-radius: 15px; padding: 10px; font-size: 11px; overflow-y: auto; margin-top: 10px; border: 1px solid #222; }
        .msg { margin-bottom: 5px; }
        .msg b { color: var(--accent); }
    </style>
</head>
<body>

<div class="phone-wrapper">
    <div id="login-screen">
        <h1 style="text-align:center; font-size:28px;">BLOX<span>PRO</span></h1>
        <p style="text-align:center; color:#666; font-size:12px;">2026 Trading Network</p>
        <input type="text" id="roblox-user" class="login-input" placeholder="Roblox Username">
        <button class="btn" onclick="login()">SİSTEME BAĞLAN</button>
        <p id="error" style="color:red; font-size:10px; text-align:center; margin-top:10px; display:none;">Kullanıcı bulunamadı!</p>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div style="font-weight:800;">MARKET</div>
            <div id="top-user" style="font-size:11px; color:var(--accent);">@user</div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">Cüzdan <span id="user-beli">0 B$</span></div>
            <div class="stat-item">Kredi <span id="user-robux">0 R$</span></div>
            <div class="stat-item">Rank <span style="color:white;">Pro</span></div>
        </div>

        <div class="scroll-area" id="fruit-list">
            </div>

        <nav>
            <div class="nav-item active" onclick="openPanel('main')">🏠</div>
            <div class="nav-item" onclick="openPanel('trade')">🔄</div>
            <div class="nav-item" onclick="openPanel('profile')">👤</div>
        </nav>
    </div>

    <div id="trade-panel" class="panel">
        <div onclick="closePanels()" style="font-size:24px;">←</div>
        <h2>Takas Odası</h2>
        <div class="chat-box" id="chat">
            <div class="msg"><b>Sistem:</b> Hoş geldin! Takas için meyve ara.</div>
            <div class="msg"><b>Bot_Admin:</b> Dragon için 10M Beli aranıyor.</div>
        </div>
        <input type="text" id="t-input" class="login-input" placeholder="Meyve ekle...">
        <button class="btn" onclick="sendMsg()">TAKASA KOY</button>
    </div>

    <div id="profile-panel" class="panel">
        <div onclick="closePanels()" style="font-size:24px;">←</div>
        <center>
            <div style="width:80px; height:80px; background:var(--accent); border-radius:50%; margin-top:20px;"></div>
            <h2 id="p-name">Username</h2>
            <p style="color:#444;">ID: 482930221</p>
            <button class="btn" style="background:#ff3232; margin-top:50px;" onclick="location.reload()">LOGOUT</button>
        </center>
    </div>
</div>

<script>
    function login() {
        const user = document.getElementById('roblox-user').value;
        if(user.length < 3) {
            document.getElementById('error').style.display = "block";
            return;
        }

        // Giriş Başarılı
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('main-app').style.display = "flex";
        document.getElementById('top-user').innerText = "@" + user;
        document.getElementById('p-name').innerText = user;
        
        // Rastgele Para Atama (Bot simülasyonu)
        document.getElementById('user-beli').innerText = Math.floor(Math.random() * 10) + "M B$";
        document.getElementById('user-robux').innerText = Math.floor(Math.random() * 5000) + " R$";

        loadFruits();
    }

    function loadFruits() {
        const items = [
            {n:"Gravity", e:"🌌", s:1}, {n:"Love", e:"💝", s:1}, 
            {n:"Portal", e:"🌀", s:1}, {n:"Magma", e:"🌋", s:1},
            {n:"Dragon", e:"🐉", s:0}, {n:"Kitsune", e:"🦊", s:0}
        ];
        const list = document.getElementById('fruit-list');
        list.innerHTML = "";
        items.forEach(i => {
            list.innerHTML += `
                <div class="card">
                    <div class="icon">${i.e}</div>
                    <div style="flex:1"><b>${i.n}</b><br><small style="color:${i.s?'#00ffa3':'#ff3232'}">${i.s?'Stokta (1)':'Tükendi (0)'}</small></div>
                </div>`;
        });
    }

    function openPanel(id) {
        closePanels();
        if(id !== 'main') {
            document.getElementById(id + '-panel').classList.add('open');
        }
    }

    function closePanels() {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
    }

    function sendMsg() {
        const inp = document.getElementById('t-input');
        if(inp.value) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg"><b>Siz:</b> ${inp.value} masaya koyuldu!</div>`;
            chat.scrollTop = chat.scrollHeight;
            inp.value = "";
        }
    }
</script>

</body>
</html>
