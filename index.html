<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blox Pro Elite 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --secondary: #7000ff;
            --bg: #020205;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Space Grotesk', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden;
        }

        /* TELEFON KASASI */
        .app-container {
            width: 100%; max-width: 390px; height: 844px; /* iPhone 14-15 Pro Boyutu */
            background: var(--bg); border: 10px solid #1a1a1a;
            border-radius: 50px; position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        /* --- LOGIN PAGE --- */
        #login-page {
            position: absolute; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; padding: 40px;
            background-image: radial-gradient(circle at 50% -20%, var(--secondary), transparent);
        }
        .login-title { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 10px; }
        .login-input { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 18px; border-radius: 15px; color: #fff; width: 100%;
            margin: 20px 0; outline: none; font-family: inherit;
        }
        .login-btn { 
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            color: #000; border: none; padding: 18px; border-radius: 15px;
            font-weight: 700; cursor: pointer; font-size: 16px;
        }

        /* --- MAIN APP --- */
        #app-content { display: none; height: 100%; flex-direction: column; opacity: 0; transition: 0.5s; }
        
        /* CÜZDAN BÖLÜMÜ */
        .wallet-header {
            padding: 30px 20px; background: linear-gradient(to bottom, rgba(112,0,255,0.1), transparent);
        }
        .wallet-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 25px; backdrop-filter: blur(10px);
        }
        .bc-balance { font-size: 24px; font-weight: 700; color: var(--accent); }
        .mini-stats { display: flex; gap: 15px; margin-top: 10px; font-size: 11px; opacity: 0.7; }

        /* MEYVE LİSTESİ */
        .market-scroll { flex: 1; overflow-y: auto; padding: 0 20px 100px; }
        .item-row {
            background: var(--card); border: 1px solid var(--border);
            padding: 15px; border-radius: 20px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 15px;
            transition: 0.3s;
        }
        .item-row:hover { border-color: var(--accent); transform: scale(0.98); }
        .item-img { width: 55px; height: 55px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .item-info b { font-size: 15px; display: block; }
        .item-info span { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; }
        .item-price { margin-left: auto; text-align: right; font-size: 12px; }
        .price-beli { color: #00ff88; font-weight: 700; }

        /* NAVİGASYON */
        nav {
            position: absolute; bottom: 25px; left: 20px; right: 20px;
            background: rgba(10,10,15,0.8); border: 1px solid var(--border);
            padding: 18px; border-radius: 30px; display: flex; justify-content: space-around;
            backdrop-filter: blur(20px);
        }
        .nav-link { cursor: pointer; font-size: 20px; filter: grayscale(1); transition: 0.3s; }
        .nav-link.active { filter: grayscale(0); transform: translateY(-5px); }

        /* YAN PANELLER (TAKAS & PROFİL) */
        .side-panel {
            position: absolute; inset: 0; background: var(--bg); z-index: 600;
            transform: translateY(100%); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px 25px;
        }
        .side-panel.active { transform: translateY(0); }
        .panel-close { position: absolute; top: 20px; right: 20px; font-size: 24px; color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="login-page">
        <div class="login-title">BLOX<span>PRO</span></div>
        <p style="text-align:center; opacity:0.5; font-size:12px;">Next-Gen Trading Platform</p>
        <input type="text" id="rbx-name" class="login-input" placeholder="Roblox Username">
        <button class="login-btn" onclick="auth()">SİSTEME GİR</button>
    </div>

    <div id="app-content">
        <div class="wallet-header">
            <div class="wallet-card">
                <div style="font-size: 10px; opacity: 0.6;">SİTE BAKİYESİ</div>
                <div class="bc-balance" id="bc-val">0.00 BC</div>
                <div class="mini-stats">
                    <span>Beli: <b id="beli-val">0</b></span>
                    <span>Robux: <b id="rbx-val">0</b></span>
                </div>
            </div>
        </div>

        <div class="market-scroll" id="market-items">
            </div>

        <nav>
            <div class="nav-link active" onclick="nav('main')">💠</div>
            <div class="nav-link" onclick="nav('trade')">🔄</div>
            <div class="nav-link" onclick="nav('profile')">👤</div>
        </nav>
    </div>

    <div id="trade-panel" class="side-panel">
        <div class="panel-close" onclick="nav('main')">×</div>
        <h2>Takas Pazarı</h2>
        <div style="background:var(--card); padding:20px; border-radius:20px; min-height:100px; margin-bottom:20px;" id="trade-history">
            <p style="font-size:11px; opacity:0.4;">Henüz bir takas başlatılmadı.</p>
        </div>
        <input type="text" id="trade-in" class="login-input" placeholder="Meyve adını yaz...">
        <button class="login-btn" style="width:100%;" onclick="startTrade()">TAKASA EKLE</button>
    </div>

    <div id="profile-panel" class="side-panel">
        <div class="panel-close" onclick="nav('main')">×</div>
        <center>
            <div style="width:100px; height:100px; border:2px solid var(--accent); border-radius:50%; margin-top:20px; display:flex; align-items:center; justify-content:center; font-size:40px;" id="p-icon">?</div>
            <h2 id="p-user" style="margin-top:15px;">Username</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:30px;">
                <div style="background:var(--card); padding:15px; border-radius:15px;">Level<br><b>2550</b></div>
                <div style="background:var(--card); padding:15px; border-radius:15px;">Üyelik<br><b style="color:var(--accent);">ELITE</b></div>
            </div>
            <button class="login-btn" style="margin-top:100px; background:red; color:#fff;" onclick="location.reload()">SİSTEMDEN ÇIK</button>
        </center>
    </div>

</div>

<script>
    function auth() {
        const name = document.getElementById('rbx-name').value;
        if(name.length < 3) return alert("Geçersiz isim!");

        document.getElementById('login-page').style.opacity = "0";
        setTimeout(() => {
            document.getElementById('login-page').style.display = "none";
            const app = document.getElementById('app-content');
            app.style.display = "flex";
            setTimeout(() => app.style.opacity = "1", 50);
            
            document.getElementById('p-user').innerText = name;
            document.getElementById('p-icon').innerText = name[0].toUpperCase();
            
            // VERİLERİ SET ET (2026 GERÇEKÇİ PİYASA)
            document.getElementById('bc-val').innerText = (Math.random() * 500).toFixed(2) + " BC";
            document.getElementById('beli-val').innerText = "15.4M";
            document.getElementById('rbx-val').innerText = "2,450";
            
            loadMarket();
        }, 500);
    }

    function loadMarket() {
        const fruits = [
            {n: "Dragon (Rework)", e: "🐉", r: "Mythical", p: "10,000,000", s: 0},
            {n: "Kitsune", e: "🦊", r: "Mythical", p: "8,000,000", s: 0},
            {n: "Gravity", e: "🌌", r: "Mythical", p: "2,500,000", s: 1},
            {n: "Portal", e: "🌀", r: "Legendary", p: "1,900,000", s: 1},
            {n: "Magma", e: "🌋", r: "Rare", p: "850,000", s: 1},
            {n: "Işık (Light)", e: "✨", r: "Rare", p: "650,000", s: 1},
            {n: "Dough", e: "🍩", r: "Mythical", p: "2,800,000", s: 0}
        ];
        const container = document.getElementById('market-items');
        container.innerHTML = "";
        fruits.forEach(f => {
            container.innerHTML += `
                <div class="item-row">
                    <div class="item-img">${f.e}</div>
                    <div class="item-info">
                        <b>${f.n}</b>
                        <span>${f.r}</span>
                    </div>
                    <div class="item-price">
                        <div class="price-beli">${f.p} B$</div>
                        <div style="font-size:9px; color:${f.s?'#00f2ff':'#ff3355'}">${f.s?'STOKTA':'TÜKENDİ'}</div>
                    </div>
                </div>
            `;
        });
    }

    function nav(id) {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
        if(id !== 'main') document.getElementById(id + '-panel').classList.add('active');
    }

    function startTrade() {
        const val = document.getElementById('trade-in').value;
        if(!val) return;
        const hist = document.getElementById('trade-history');
        if(hist.querySelector('p')) hist.innerHTML = "";
        hist.innerHTML += `<div style="margin-bottom:8px; font-size:13px;">🔹 <b>Siz:</b> ${val} masaya eklendi.</div>`;
        document.getElementById('trade-in').value = "";
    }
</script>
</body>
</html>
